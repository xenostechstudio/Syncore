name: audit-pages

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  schedule:
    # Quarterly sweep: 1st of Feb / May / Aug / Nov at 09:13 UTC.
    # Runs even if no PRs land — catches drift on dormant branches.
    - cron: '13 9 1 2,5,8,11 *'
  workflow_dispatch:

jobs:
  audit-index-pages:
    name: Index page consistency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run audit
        run: bin/audit-index-pages.sh

  audit-form-pages:
    name: Form page consistency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run audit
        run: bin/audit-form-pages.sh

  audit-livewire-actions:
    name: Livewire-action authz audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run audit
        run: bin/audit-livewire-actions.sh
