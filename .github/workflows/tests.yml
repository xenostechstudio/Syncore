name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master

jobs:
  ci:
    name: pest (${{ matrix.db }})
    runs-on: ubuntu-latest
    environment: Testing

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, pgsql]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: syncore
          POSTGRES_PASSWORD: syncore
          POSTGRES_DB: syncore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest
        env:
          DB_CONNECTION: ${{ matrix.db }}
          DB_HOST: ${{ matrix.db == 'pgsql' && '127.0.0.1' || '' }}
          DB_PORT: ${{ matrix.db == 'pgsql' && '5432' || '' }}
          DB_DATABASE: ${{ matrix.db == 'pgsql' && 'syncore_test' || ':memory:' }}
          DB_USERNAME: ${{ matrix.db == 'pgsql' && 'syncore' || '' }}
          DB_PASSWORD: ${{ matrix.db == 'pgsql' && 'syncore' || '' }}
